# Minimal starter — safe to extend later (Lambda, DynamoDB, etc.)
# Uses Serverless v3 from package.json so `npx serverless print` works without a Serverless.com login (v4 requires login).
service: photostore-learn

frameworkVersion: "3"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  httpApi:
    cors: true

functions:
  hello:
    handler: src/handler.hello
    events:
      - httpApi:
          path: /hello
          method: GET
