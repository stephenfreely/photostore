# Minimal starter — safe to extend later (Lambda, DynamoDB, etc.)
# Uses Serverless v3 from package.json so `npx serverless print` works without a Serverless.com login (v4 requires login).
service: photostore-learn

frameworkVersion: "3"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  httpApi:
    cors: true
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
        audience:
          - !Ref CognitoUserPoolClient
  environment:
    PHOTOS_TABLE: !Ref PhotosTable
    PHOTOS_BUCKET: !Ref PhotosBucket
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
          Resource:
            - !GetAtt PhotosTable.Arn
            - !Sub "${PhotosTable.Arn}/index/byOwner"
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource: !Sub "${PhotosBucket.Arn}/*"

functions:
  hello:
    handler: src/handler.hello
    events:
      - httpApi:
          path: /hello
          method: GET

  createPhoto:
    handler: src/photos.create
    events:
      - httpApi:
          path: /photos
          method: POST
          authorizer:
            name: cognitoJwt

  listPhotos:
    handler: src/photos.list
    events:
      - httpApi:
          path: /photos
          method: GET
          authorizer:
            name: cognitoJwt

  uploadPhotoUrl:
    handler: src/photos.uploadUrl
    events:
      - httpApi:
          path: /photos/upload-url
          method: POST
          authorizer:
            name: cognitoJwt

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${sls:stage}-users
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${sls:stage}-spa
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED

    PhotosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-photos
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: photoId
            AttributeType: S
          - AttributeName: ownerId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: photoId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: byOwner
            KeySchema:
              - AttributeName: ownerId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    PhotosBucket:
      Type: AWS::S3::Bucket
      Properties:
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - PUT
                - HEAD
              AllowedOrigins:
                - "*"
              ExposedHeaders:
                - ETag
              MaxAge: 3000

  Outputs:
    HttpApiUrl:
      Description: HTTP API base URL (no trailing slash)
      Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
    UserPoolId:
      Value: !Ref CognitoUserPool
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
    CognitoIssuer:
      Description: JWT issuer URL (for debugging)
      Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
