# Minimal starter — safe to extend later (Lambda, DynamoDB, etc.)
# Uses Serverless v3 from package.json so `npx serverless print` works without a Serverless.com login (v4 requires login).
service: photostore-learn

frameworkVersion: "3"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  logRetentionInDays: 14
  logs:
    httpApi:
      format: >-
        {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}
  httpApi:
    metrics: true
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Guest-Identity-Id
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      maxAge: 86400
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
        audience:
          - !Ref CognitoUserPoolClient
  environment:
    PHOTOS_TABLE: !Ref PhotosTable
    PHOTOS_BUCKET: !Ref PhotosBucket
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
          Resource:
            - !GetAtt PhotosTable.Arn
            - !Sub "${PhotosTable.Arn}/index/byOwner"
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:CopyObject
            - s3:DeleteObject
          Resource: !Sub "${PhotosBucket.Arn}/*"
        - Effect: Allow
          Action:
            - dynamodb:DeleteItem
          Resource: !GetAtt PhotosTable.Arn

functions:
  hello:
    handler: src/handlers/hello.hello
    events:
      - httpApi:
          path: /hello
          method: GET

  createPhoto:
    handler: src/handlers/photos.create
    events:
      - httpApi:
          path: /photos
          method: POST
          authorizer:
            name: cognitoJwt

  listPhotos:
    handler: src/handlers/photos.list
    events:
      - httpApi:
          path: /photos
          method: GET
          authorizer:
            name: cognitoJwt

  uploadPhotoUrl:
    handler: src/handlers/photos.uploadUrl
    events:
      - httpApi:
          path: /photos/upload-url
          method: POST
          authorizer:
            name: cognitoJwt

  mergePhotos:
    handler: src/handlers/photos.merge
    events:
      - httpApi:
          path: /photos/merge
          method: POST
          authorizer:
            name: cognitoJwt

  guestUploadPhotoUrl:
    handler: src/handlers/guestPhotos.uploadUrl
    events:
      - httpApi:
          path: /guest/photos/upload-url
          method: POST

  guestCreatePhoto:
    handler: src/handlers/guestPhotos.create
    events:
      - httpApi:
          path: /guest/photos
          method: POST

  guestListPhotos:
    handler: src/handlers/guestPhotos.list
    events:
      - httpApi:
          path: /guest/photos
          method: GET

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${sls:stage}-users
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${sls:stage}-spa
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED

    CognitoIdentityPool:
      Type: AWS::Cognito::IdentityPool
      Properties:
        IdentityPoolName: ${self:service}-${sls:stage}-identity
        AllowUnauthenticatedIdentities: true
        CognitoIdentityProviders:
          - ClientId: !Ref CognitoUserPoolClient
            ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}

    CognitoUnauthenticatedRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Federated: cognito-identity.amazonaws.com
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
                "ForAnyValue:StringLike":
                  cognito-identity.amazonaws.com:amr: unauthenticated
        Policies:
          - PolicyName: guest-minimal
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - cognito-identity:GetId
                  Resource: "*"

    CognitoAuthenticatedRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Federated: cognito-identity.amazonaws.com
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
                "ForAnyValue:StringLike":
                  cognito-identity.amazonaws.com:amr: authenticated
        # No inline policies yet (authenticated users use API JWT + presigned URLs).

    CognitoIdentityPoolRoles:
      Type: AWS::Cognito::IdentityPoolRoleAttachment
      Properties:
        IdentityPoolId: !Ref CognitoIdentityPool
        Roles:
          authenticated: !GetAtt CognitoAuthenticatedRole.Arn
          unauthenticated: !GetAtt CognitoUnauthenticatedRole.Arn

    PhotosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-photos
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: photoId
            AttributeType: S
          - AttributeName: ownerId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: photoId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: byOwner
            KeySchema:
              - AttributeName: ownerId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    PhotosBucket:
      Type: AWS::S3::Bucket
      Properties:
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - GET
                - PUT
                - HEAD
              AllowedOrigins:
                - "*"
              ExposedHeaders:
                - ETag
              MaxAge: 3000

    Api5xxAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-api-5xx
        AlarmDescription: HTTP API returned one or more 5xx responses in 5 minutes
        Namespace: AWS/ApiGateway
        MetricName: 5xx
        Dimensions:
          - Name: ApiId
            Value: !Ref HttpApi
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    LambdaErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-lambda-errors
        AlarmDescription: One or more Lambda handlers reported errors in 5 minutes
        ComparisonOperator: GreaterThanThreshold
        Threshold: 0
        EvaluationPeriods: 1
        TreatMissingData: notBreaching
        Metrics:
          - Id: totalErrors
            Expression: SUM(METRICS())
            Label: TotalLambdaErrors
            ReturnData: true
          - Id: hello
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-hello
              Period: 300
              Stat: Sum
          - Id: createPhoto
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-createPhoto
              Period: 300
              Stat: Sum
          - Id: listPhotos
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-listPhotos
              Period: 300
              Stat: Sum
          - Id: uploadPhotoUrl
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-uploadPhotoUrl
              Period: 300
              Stat: Sum
          - Id: mergePhotos
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-mergePhotos
              Period: 300
              Stat: Sum
          - Id: guestUploadPhotoUrl
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-guestUploadPhotoUrl
              Period: 300
              Stat: Sum
          - Id: guestCreatePhoto
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-guestCreatePhoto
              Period: 300
              Stat: Sum
          - Id: guestListPhotos
            ReturnData: false
            MetricStat:
              Metric:
                Namespace: AWS/Lambda
                MetricName: Errors
                Dimensions:
                  - Name: FunctionName
                    Value: ${self:service}-${sls:stage}-guestListPhotos
              Period: 300
              Stat: Sum

  Outputs:
    # Do not define HttpApiUrl here — Serverless already outputs it for httpApi (duplicate name breaks deploy).
    UserPoolId:
      Value: !Ref CognitoUserPool
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
    IdentityPoolId:
      Value: !Ref CognitoIdentityPool
    CognitoIssuer:
      Description: JWT issuer URL (for debugging)
      Value: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
