# Minimal starter — safe to extend later (Lambda, DynamoDB, etc.)
# Uses Serverless v3 from package.json so `npx serverless print` works without a Serverless.com login (v4 requires login).
service: photostore-learn

frameworkVersion: "3"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  httpApi:
    cors: true
  environment:
    PHOTOS_TABLE: !Ref PhotosTable
    PHOTOS_BUCKET: !Ref PhotosBucket
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
          Resource: !GetAtt PhotosTable.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource: !Sub "${PhotosBucket.Arn}/*"

functions:
  hello:
    handler: src/handler.hello
    events:
      - httpApi:
          path: /hello
          method: GET

  createPhoto:
    handler: src/photos.create
    events:
      - httpApi:
          path: /photos
          method: POST

  listPhotos:
    handler: src/photos.list
    events:
      - httpApi:
          path: /photos
          method: GET

  uploadPhotoUrl:
    handler: src/photos.uploadUrl
    events:
      - httpApi:
          path: /photos/upload-url
          method: POST

resources:
  Resources:
    PhotosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-photos
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: photoId
            AttributeType: S
        KeySchema:
          - AttributeName: photoId
            KeyType: HASH

    PhotosBucket:
      Type: AWS::S3::Bucket
      Properties:
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - PUT
                - HEAD
              AllowedOrigins:
                - "*"
              ExposedHeaders:
                - ETag
              MaxAge: 3000
